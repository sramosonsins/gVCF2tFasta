# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest,macos-latest ]  # , windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang] # clang, cl]
        include:
          # - os: windows-latest
          #   c_compiler: cl
          #   cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
          # - os: macos-latest-xlarge
          #   c_compiler: gcc
          #   cpp_compiler: g++
          # - os: macos-latest-xlarge
          #   c_compiler: clang
          #   cpp_compiler: clang++

        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    ## Install htslib and run only in ubuntu-latest
    - name : Install htslib ubuntu
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libhts-dev
    
    ## Install htslib on macOS and run only in macos-latest or macos-latest-xlarge
    - name : Install htslib macOS 
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-latest-xlarge'
      run: |
        brew install htslib
        
    
    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
    

    ## make release
    - name: Create release tarball
      run: |
        cd ${{ steps.strings.outputs.build-output-dir }}
        cpack -G TGZ
    - name: Upload release tarball
      uses: actions/upload-artifact@v4
      with:
        # Name of the artifact. This is the name that will be displayed in the GitHub Actions UI.
        # get the name of the release tarball

        name: vcf2tfa-release
        path: |
           ${{ steps.strings.outputs.build-output-dir }}/*.tar.gz
           ${{ steps.strings.outputs.build-output-dir }}/version.txt

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}


  release:
    runs-on: ubuntu-latest
    ## only run when build job is successful
    needs: build
    ## only run on master branch
    if: github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v4
    - name: Download release tarball
      uses: actions/download-artifact@v4
      with:
        name: vcf2tfa-release
        path: ${{ github.workspace }}/vcf2tfa-release

    - name: check release tarball
      run: ls -l ${{ github.workspace }}/vcf2tfa-release/ 

    - name: version
      run: |
        echo "version=$(cat ${{ github.workspace }}/vcf2tfa-release/version.txt)" >> "$GITHUB_ENV"
        echo "version=$(cat ${{ github.workspace }}/vcf2tfa-release/version.txt)" >> "$GITHUB_OUTPUT"
      id: version

    - name: Create Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        prerelease: false
        name: v${{ steps.version.outputs.version }}
        tag_name: v${{ steps.version.outputs.version }}
        body_path: CHANGELOG.md
        target_commitish: ${{ github.sha }}
        files: |
          ${{ github.workspace }}/vcf2tfa-release/vcf2tfa-${{ steps.version.outputs.version }}-Linux.tar.gz
          ${{ github.workspace }}/vcf2tfa-release/vcf2tfa-${{ steps.version.outputs.version }}-Darwin.tar.gz
      env:
        GITHUB_TOKEN: ${{ github.token }}
